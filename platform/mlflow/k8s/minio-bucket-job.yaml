apiVersion: batch/v1
kind: Job
metadata:
  name: create-mlflow-bucket
  namespace: mlflow
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              sleep 10
              mc alias set local http://minio:9000 minio minio123
              mc mb -p local/mlflow-artifacts || true