name: fraudguard-ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e .

      - name: Prepare reports directory
        run: |
          mkdir -p reports/tests

      - name: Run lint
        run: |
          ruff check .

      - name: Run tests
        run: |
          pytest -q --junitxml=reports/tests/junit.xml

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: reports/tests

      - name: Write job summary
        if: always()
        run: |
          echo "## FraudGuard CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Lint completed" >> $GITHUB_STEP_SUMMARY
          echo "- Tests completed" >> $GITHUB_STEP_SUMMARY
          echo "- Test report uploaded as artifact" >> $GITHUB_STEP_SUMMARY
  
  validate-synthetic-data-build-features:
    needs: lint-and-test
    name: Validate synthetic data sample and feature build 
    runs-on: ubuntu-latest
        
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      
      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e .
      
      - name: Generate synthetic data sample
        env:
          PYTHONPATH: .
        run: |
          python scripts/create_synthetic_sample.py

      - name: Validate data sample
        env:
          PYTHONPATH: .
        run: |
          python scripts/check_data.py

      - name: Upload data validation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: data-validation-report
          path: reports/data
      
      - name: Write job summary
        if: always()
        run: |
          echo "## FraudGuard CI Validation" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/data/sample_validation.json ]; then
            echo "### Metrics" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat reports/data/sample_validation.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Data validation completed" >> $GITHUB_STEP_SUMMARY
          echo "- Validation report uploaded as artifact" >> $GITHUB_STEP_SUMMARY
      
      - name: Validate data with Pandera
        env:
          PYTHONPATH: .
        run: |
          python scripts/validate_data.py

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pandera-validation-report
          path: reports/data
      
      - name: Write job summary
        if: always()
        run: |
          echo "## FraudGuard CI Pandera Validation" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/data/validation_report.json ]; then
            echo "### Pandera Validation Results" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat reports/data/validation_report.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Pandera validation completed" >> $GITHUB_STEP_SUMMARY
          echo "- Pandera validation report uploaded as artifact" >> $GITHUB_STEP_SUMMARY
      
      - name: Build feature dataset
        env:
          PYTHONPATH: .
        run: |
          python products/fraudguard/features/build_features.py

      - name: Upload feature report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: feature-contract-report
          path: reports/features
      
      - name: Write job summary
        if: always()
        run: |
          echo "## FraudGuard CI Feature Validation" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/features/feature_contract.json ]; then
            echo "### Feature Contract Validation Results" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat reports/features/feature_contract.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Feature contract validation completed" >> $GITHUB_STEP_SUMMARY
          echo "- Feature contract report uploaded as artifact" >> $GITHUB_STEP_SUMMARY